name: "deploy (build + push + ssh)"
# Repo-per-project SSH-push deploy: bu repo push'unda imajı GHCR'a push eder ve
# sunucuya SSH ile deploy eder (deploy.json enabled:true ise). Sunucuda cron/ajan yok.
# tas-kag-t-makas-oyunu-yap scaffold sırasında proje adıyla değiştirilir.
# GitHub Secrets (bir kez): DEPLOY_SSH_KEY[_SUFFIX], DEPLOY_HOST[_SUFFIX], DEPLOY_USER[_SUFFIX].
# Hedef sunucu deploy.json.server + secret adları deploy.json.secret_names ile seçilir (çoklu sunucu).
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: "image tag"
        required: false
        default: "latest"
        type: string
permissions:
  contents: read
  packages: write
jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.gate.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
      - name: "enabled gate (deploy.json)"
        id: gate
        run: |
          en="$(node -e "try{process.stdout.write(String(JSON.parse(require('fs').readFileSync('deploy.json','utf8')).enabled===true))}catch(e){process.stdout.write('false')}")"
          echo "enabled=$en" >> "$GITHUB_OUTPUT"
      - name: "GHCR login"
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: "build & push"
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMG="ghcr.io/$OWNER/tas-kag-t-makas-oyunu-yap"
          docker build -t "$IMG:${{ inputs.tag || 'latest' }}" -t "$IMG:${GITHUB_SHA::12}" .
          docker push "$IMG:${{ inputs.tag || 'latest' }}"
          docker push "$IMG:${GITHUB_SHA::12}"
  ssh-deploy:
    needs: build-push
    if: needs.build-push.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: "read deploy.json"
        id: cfg
        run: |
          node -e '
            const c = require("./deploy.json"); const p = "tas-kag-t-makas-oyunu-yap";
            const host = (c.subdomain || "{project}").replace("{project}", p) + "." + c.domain;
            const sn = c.secret_names || {};
            const out = [
              "host=" + host, "host_port=" + c.host_port, "port=" + c.port, "cert_base=" + c.cert_base,
              "secret_host=" + (sn.host || "DEPLOY_HOST"),
              "secret_user=" + (sn.user || "DEPLOY_USER"),
              "secret_key=" + (sn.key || "DEPLOY_SSH_KEY"),
            ].join("\n");
            require("fs").appendFileSync(process.env.GITHUB_OUTPUT, out + "\n");
          '
      - name: "ssh deploy"
        env:
          # Hedef sunucunun secret adları deploy.json.secret_names'ten gelir (çoklu sunucu).
          DEPLOY_SSH_KEY: ${{ secrets[steps.cfg.outputs.secret_key] }}
          DEPLOY_HOST: ${{ secrets[steps.cfg.outputs.secret_host] }}
          DEPLOY_USER: ${{ secrets[steps.cfg.outputs.secret_user] }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id && chmod 600 ~/.ssh/id
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMG="ghcr.io/$OWNER/tas-kag-t-makas-oyunu-yap:latest"
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id "$DEPLOY_USER@$DEPLOY_HOST" \
            "GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' GHCR_USER='${{ github.actor }}' PROJECT='tas-kag-t-makas-oyunu-yap' IMAGE='$IMG' HOST='${{ steps.cfg.outputs.host }}' HOST_PORT='${{ steps.cfg.outputs.host_port }}' PORT='${{ steps.cfg.outputs.port }}' CERT_BASE='${{ steps.cfg.outputs.cert_base }}' bash -s" < deploy/remote-deploy.sh
